name: Build macOS App

# Builds TheWatcher.app on a macOS runner so it can be downloaded and run
# without any local toolchain or terminal use.
#
#  - Every push to main / manual run -> downloadable build artifact (Actions tab)
#  - Pushing a tag like v1.0.0       -> a GitHub Release with TheWatcher.zip attached

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build .app bundle
        run: |
          chmod +x make_app.sh
          ./make_app.sh

      - name: Zip the app
        run: ditto -c -k --keepParent build/TheWatcher.app build/TheWatcher.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheWatcher-macOS
          path: build/TheWatcher.zip
          if-no-files-found: error

      - name: Publish release (tagged builds only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" build/TheWatcher.zip \
            --title "TheWatcher ${GITHUB_REF_NAME}" \
            --notes $'Download **TheWatcher.zip**, unzip it, and double-click **TheWatcher.app**.\n\nFirst launch: because the app is not signed with an Apple Developer certificate, right-click the app and choose **Open** (or allow it under System Settings > Privacy & Security > Open Anyway).'
